version: '3.8'

services:
  # 1. MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: repomind-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Redis Message Broker Service
  redis:
    image: redis:7.0-alpine
    container_name: repomind-redis
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 3. Backend REST API Service
  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repomind-backend-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/repomind
      - REDIS_URL=redis://redis:6379
      - JWT_ACCESS_SECRET=sk_repomind_access_secret_signature_code_2026
      - STORAGE_DRIVER=local
      - NODE_ENV=production
      - ADMIN_EMAILS=admin@repomind.ai
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shared-uploads:/app/src/uploads
    restart: always

  # 4. Asynchronous Background Workers Service
  backend-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: repomind-backend-worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017/repomind
      - REDIS_URL=redis://redis:6379
      - STORAGE_DRIVER=local
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - shared-uploads:/app/src/uploads
    restart: always

volumes:
  mongo-data:
  redis-data:
  shared-uploads:
